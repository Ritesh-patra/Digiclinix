            { id: 74, name: "Glucose Challenge Test (75 g) - 2 hours", price: 550, mrp: 650, off: "15%", params: 1, icon: "fa-cookie", color: "from-lime-600 to-green-700", image: "images/placeholder.svg", tests: ["GCT 2h"] },
            { id: 77, name: "Gram Staining", price: 300, mrp: 360, off: "17%", params: 1, icon: "fa-microscope", color: "from-indigo-600 to-purple-800", image: "images/placeholder.svg", tests: ["Gram Stain"] },
            { id: 78, name: "Hb TC DC", price: 350, mrp: 420, off: "17%", params: 1, icon: "fa-vial", color: "from-blue-600 to-indigo-700", image: "images/placeholder.svg", tests: ["Hb TC DC"] },
            { id: 80, name: "Haemoglobin (Hb)", price: 180, mrp: 220, off: "18%", params: 1, icon: "fa-vial", color: "from-blue-600 to-indigo-700", image: "images/placeholder.svg", tests: ["Haemoglobin"] },
            { id: 81, name: "HBsAg (ECLIA)", price: 940, mrp: 1100, off: "15%", params: 1, icon: "fa-virus", color: "from-red-600 to-rose-900", image: "images/placeholder.svg", tests: ["HBsAg"] },
            { id: 82, name: "HBsAg (Qualitative) (Rapid)", price: 500, mrp: 600, off: "17%", params: 1, icon: "fa-vials", color: "from-teal-600 to-emerald-800", image: "images/placeholder.svg", tests: ["HBsAg (Rapid)"] },
            { id: 83, name: "HDL Cholesterol", price: 240, mrp: 290, off: "17%", params: 1, icon: "fa-heart-pulse", color: "from-rose-600 to-pink-800", image: "images/placeholder.svg", tests: ["HDL"] },
            { id: 84, name: "Homocysteine (HCY)", price: 1200, mrp: 1400, off: "14%", params: 1, icon: "fa-vial", color: "from-purple-600 to-violet-800", image: "images/placeholder.svg", tests: ["Homocysteine"] },
            { id: 85, name: "HIV 1&2 (Qualitative) (Rapid)", price: 550, mrp: 650, off: "15%", params: 1, icon: "fa-virus", color: "from-red-600 to-rose-900", image: "images/placeholder.svg", tests: ["HIV 1&2 Rapid"] },
            { id: 86, name: "Immunoglobulin E (Total IgE)", price: 850, mrp: 1000, off: "15%", params: 1, icon: "fa-vials", color: "from-teal-600 to-emerald-800", image: "images/placeholder.svg", tests: ["Total IgE"] },
            { id: 88, name: "Indirect Coombs Test (ICT)", price: 800, mrp: 950, off: "16%", params: 1, icon: "fa-vials", color: "from-teal-600 to-emerald-800", image: "images/placeholder.svg", tests: ["Indirect Coombs"] },
            { id: 89, name: "Total Iron", price: 500, mrp: 600, off: "17%", params: 1, icon: "fa-vial", color: "from-blue-600 to-indigo-700", image: "images/placeholder.svg", tests: ["Total Iron"] },
            { id: 90, name: "Iron Profile", price: 1300, mrp: 1600, off: "19%", params: 1, icon: "fa-vial", color: "from-blue-600 to-indigo-700", image: "images/placeholder.svg", tests: ["Iron Profile"] }
        ];

        // Render services (supports optional filterTerm)
        function renderServices(filterTerm = '') {
            const container = document.getElementById('service-container');
            const q = (filterTerm || '').toLowerCase().trim();
            const filtered = q ? services.filter(s => {
                if ((s.name||'').toLowerCase().includes(q)) return true;
                if ((s.tests||[]).some(t => t.toLowerCase().includes(q))) return true;
                return false;
            }) : services;

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-slate-400 py-20">No tests found for "${filterTerm}"</div>`;
                return;
            }

            container.innerHTML = filtered.map(s => `
                <div class="service-card bg-white rounded-[2.5rem] overflow-hidden flex flex-col h-full shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                    <div class="bg-gradient-to-br ${s.color} p-6 text-white relative flex items-center gap-4">
                        <img src="${s.image}" alt="${s.name}" class="w-16 h-16 rounded-full object-cover border-2 border-white/20 shadow-lg" />
                        <div class="flex-1">
                            <h3 class="text-lg font-black pr-6 leading-tight mb-1">${s.name}</h3>
                            <div class="flex items-end gap-3">
                                <div>
                                    <span class="text-[11px] line-through opacity-50 block mb-0.5">₹${s.mrp}</span>
                                    <span class="text-2xl font-black tracking-tight">₹${s.price}</span>
                                </div>
                                <span class="bg-white/20 backdrop-blur-md text-white text-[10px] font-black px-3 py-1.5 rounded-xl border border-white/20">${s.off} OFF</span>
                            </div>
                        </div>
                        <div class="absolute top-6 right-6 w-12 h-12 rounded-full bg-white/10 flex items-center justify-center backdrop-blur-md">
                            <i class="fas ${s.icon} text-xl"></i>
                        </div>
                    </div>
                    <div class="p-6 flex flex-col flex-1">
                        <div class="flex items-center gap-3 text-slate-400 font-bold text-[11px] mb-6 uppercase tracking-widest">
                            <i class="fas fa-file-medical text-purple-600 text-sm"></i> 6 Hours Report
                        </div>
                        <div class="mb-4 text-sm text-slate-600">${(s.tests||[]).slice(0,4).join(', ')}</div>
                        <div class="flex gap-3 mt-auto">
                            <button onclick="openDetails(${s.id})" class="flex-1 py-3 border-2 border-slate-100 rounded-2xl text-[11px] font-black uppercase text-slate-400 hover:border-purple-600 hover:text-purple-600 transition-all">Details</button>
                            <button onclick="addToCart(${s.id})" class="flex-[1.3] py-3 bg-orange-400 text-white rounded-2xl font-black text-[11px] uppercase shadow-lg shadow-orange-100 active:scale-95 transition-all">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `).join('');
            updateCartUI();
        }

        function init() {
            renderServices();
            // wire search input
            const search = document.getElementById('test-search');
            if (search) {
                search.addEventListener('input', (e) => {
                    renderServices(e.target.value);
                });
            }
        }

        function addToCart(id) {
            const s = services.find(x => x.id === id);
            cart.push(s);
            updateCartUI();
            toggleCart(true);
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-badge').innerText = cart.length;
            const list = document.getElementById('cart-items-list');
            const totalDisplay = document.getElementById('total-price');
            
            if(cart.length === 0) {
                list.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-300 opacity-50 py-10"><i class="fas fa-shopping-basket text-6xl mb-4"></i><p class="font-bold">Cart is empty</p></div>`;
            } else {
                list.innerHTML = cart.map((item, index) => `
                    <div class="bg-slate-50 p-5 rounded-[1.5rem] flex justify-between items-center border border-slate-100">
                        <div class="min-w-0">
                            <h4 class="font-bold text-slate-800 text-sm truncate">${item.name}</h4>
                            <p class="text-purple-600 font-black">₹${item.price}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="w-10 h-10 rounded-full bg-red-50 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all flex-shrink-0 z-10"><i class="fas fa-trash-alt text-sm"></i></button>
                    </div>
                `).join('');
            }
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            updateCartTotalWithCoupon(total);
        }

        function toggleCart(show) {
            const sidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('cartOverlay');
            if(show) {
                sidebar.classList.remove('translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function openDetails(id) {
            const s = services.find(x => x.id === id);
            const modal = document.getElementById('detailsModal');
            const content = document.getElementById('modalContent');
            currentDetailsId = id;
            
            document.getElementById('m-header').className = `p-10 text-white relative bg-gradient-to-br ${s.color}`;
            const mImg = document.getElementById('m-image');
            if (mImg) { mImg.src = s.image || 'images/placeholder.svg'; mImg.alt = s.name || 'test image'; }
            document.getElementById('m-title').innerText = s.name;
            document.getElementById('m-price').innerText = `Special Offer: ₹${s.price}`;
            document.getElementById('m-list').innerHTML = s.tests.map(t => `<li class="flex items-center gap-3"><i class="fas fa-check-circle text-emerald-500"></i> ${t}</li>`).join('');
            document.getElementById('m-add-btn').onclick = () => { addToCart(s.id); closeModal(); };
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => content.classList.remove('scale-95'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('detailsModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function checkoutWhatsApp() {
            if (cart.length === 0) return;
            const itemsArr = cart.map((p, i) => `${i + 1}. ${p.name} (₹${p.price})`);
            const items = itemsArr.join('\n');
            const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            const city = localStorage.getItem('selectedCity') || (document.getElementById('city-text-pc') && document.getElementById('city-text-pc').innerText) || (document.getElementById('city-text-mob') && document.getElementById('city-text-mob').innerText) || 'Not specified';
            const { discount, finalTotal } = computeDiscount(subtotal);
            const couponLine = appliedCoupon && COUPONS[appliedCoupon] ? `Coupon: ${appliedCoupon} (${COUPONS[appliedCoupon].label})\nSaved: ₹${discount}\n` : '';
            const msgPlain = `*DIGICLINIX DIAGNOSTICS*\n\n*Selected Tests:*\n${items}\n\nSubtotal: ₹${subtotal}\n${couponLine}Payable: ₹${finalTotal}\nBooking City: ${city}`;
            window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msgPlain)}`);
        }

        // Coupon logic
        const COUPONS = {
            'DIGI10': { type: 'percent', value: 10, label: '10% off' },
            'FREECONSULT': { type: 'flat', value: 0, label: 'Free consult' }
        };
        let appliedCoupon = null;

        function computeDiscount(total) {
            if (!appliedCoupon) return { discount: 0, finalTotal: total };
            const c = COUPONS[appliedCoupon]; if(!c) return { discount:0, finalTotal: total };
            const discount = c.type === 'percent' ? Math.round((c.value/100)*total) : c.value;
            return { discount, finalTotal: Math.max(0, total - discount) };
        }

        function updateCartTotalWithCoupon(total) {
            const originalEl = document.getElementById('cart-original-total');
            const totalEl = document.getElementById('total-price');
            const feedback = document.getElementById('coupon-feedback');
            const removeBtn = document.getElementById('remove-coupon-btn');
            const applyBtn = document.getElementById('apply-coupon-btn');
            const codeInput = document.getElementById('coupon-code');
            if (appliedCoupon) {
                const { discount, finalTotal } = computeDiscount(total);
                originalEl.innerText = `₹${total}`; originalEl.classList.remove('hidden');
                totalEl.innerText = `₹${finalTotal}`;
                feedback.classList.remove('hidden'); feedback.innerText = `${COUPONS[appliedCoupon].label} applied — saved ₹${discount}`;
                removeBtn.classList.remove('hidden'); applyBtn.disabled = true; codeInput.disabled = true;
            } else {
                originalEl.classList.add('hidden'); totalEl.innerText = `₹${total}`; feedback.classList.add('hidden'); removeBtn.classList.add('hidden'); applyBtn.disabled = false; codeInput.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const applyBtn = document.getElementById('apply-coupon-btn');
            const removeBtn = document.getElementById('remove-coupon-btn');
            if (applyBtn) applyBtn.addEventListener('click', () => {
                const code = (document.getElementById('coupon-code').value||'').trim().toUpperCase(); if(!code) return alert('Enter coupon code'); if(!COUPONS[code]) return alert('Invalid coupon'); appliedCoupon = code; updateCartUI();
            });
            if (removeBtn) removeBtn.addEventListener('click', () => { appliedCoupon = null; document.getElementById('coupon-code').value=''; updateCartUI(); });
        });

        init();
    </script>
</body>
